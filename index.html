<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <!-- Immediately forward the browser to the new URL -->
  <meta http-equiv="refresh" content="0; URL=https://natalieduerr.com/">
  <!-- Tell search engines the definitive location of your content -->
  <link rel="canonical" href="https://natalieduerr.com/">
  <script>
    // JavaScript fallback if the meta refresh fails
    window.location.replace("https://natalieduerr.com/");
  </script>
</head>
<body>
  <p>If you are not redirected automatically, follow this <a href="https://natalieduerr.com/">link to the new website</a>.</p>
</body>
</html>
